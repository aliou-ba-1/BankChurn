services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bankchurn-api
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).status == 200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  streamlit:
    build:
      context: .
      dockerfile: streamlit/Dockerfile
    container_name: bankchurn-streamlit
    environment:
      API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8501:8501"
